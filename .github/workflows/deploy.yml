name: Deploy GSP080

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Deploy Function
        uses: 'google-github-actions/deploy-cloud-functions@v2'
        with:
          name: nodejs-pubsub-function
          runtime: nodejs20
          region: europe-west4
          gen2: true
          source_dir: .
          entry_point: helloPubSub
          # Utilisation de la syntaxe simplifiée pour Gen2 Pub/Sub
          event_trigger_type: google.cloud.pubsub.topic.v1.messagePublished
          event_trigger_resource: projects/${{ secrets.GCP_PROJECT_ID }}/topics/cf-demo
          # Indispensable pour contourner la 403 sur la création de bucket
          flags: '--stage-bucket=${{ secrets.GCP_PROJECT_ID }}-bucket'