name: Deploy to GCP
on:
  push:
    branches:
      - main

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          project_id: 'qwiklabs-gcp-03-8e4b21a31bef'
          workload_identity_provider: 'projects/464846482145/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-action-sa@qwiklabs-gcp-03-8e4b21a31bef.iam.gserviceaccount.com'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Deploy to Cloud Run'
        run: |
          gcloud run deploy mon-service \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --project qwiklabs-gcp-03-8e4b21a31bef \
            --platform managed \
            --quiet